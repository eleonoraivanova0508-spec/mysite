<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Смена пароля</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .btn-custom {
            background: #4facfe;
            border: none;
        }

        .btn-custom:hover {
            background: #3a8de0;
        }

        .back-link {
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card p-4">
                <h3 class="text-center mb-4">🔐 Смена пароля</h3>

                <!-- Сообщения -->
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-success">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Старый пароль</label>
                        {{ form.old_password }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Новый пароль</label>
                        {{ form.new_password1 }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Подтверждение пароля</label>
                        {{ form.new_password2 }}
                    </div>

                    <button type="submit" class="btn btn-custom w-100 text-white">
                        Сменить пароль
                    </button>
                </form>

                <div class="text-center mt-3">
                    <a href="{% url 'profile_edit' %}" class="back-link">
                        ← Назад к профилю
                    </a>
                </div>
            </div>

        </div>
    </div>
</div>
<div class="text-danger mb-3">
    {{ form.errors }}
</div>

</body>
</html>
