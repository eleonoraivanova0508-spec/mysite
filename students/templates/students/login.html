<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            background:url('https://i.pinimg.com/474x/21/11/c2/2111c206bf9bd977de79d1aa6a2a7f8b.jpg');

            background-size:cover;
            background-position:center;
        }

        .login-box{

            width:400px;

            padding:40px;

            border-radius:20px;

            background:rgba(255,255,255,0.15);

            backdrop-filter:blur(12px);

            box-shadow:0 8px 32px rgba(0,0,0,0.3);

            border:1px solid rgba(255,255,255,0.2);
        }

        .login-box h2{

            text-align:center;

            color:white;

            margin-bottom:30px;

            font-size:32px;
        }

        form p{
            margin-bottom:20px;
        }

        form label{

            display:block;

            color:white;

            margin-bottom:8px;

            font-size:15px;
        }

        form input{

            width:100%;

            padding:12px;

            border:none;

            border-radius:10px;

            outline:none;

            background:rgba(255,255,255,0.2);

            color:white;

            font-size:16px;
        }

        form input::placeholder{
            color:#ddd;
        }

        button{

            width:100%;

            padding:14px;

            border:none;

            border-radius:12px;

            background:white;

            color:black;

            font-size:17px;

            font-weight:bold;

            cursor:pointer;

            transition:0.3s;
        }

        button:hover{

            transform:scale(1.03);

            background:#f1f1f1;
        }

        .register-link{

            margin-top:20px;

            text-align:center;
        }

        .register-link a{

            color:white;

            text-decoration:none;

            font-size:15px;
        }

        .register-link a:hover{
            text-decoration:underline;
        }

    </style>

</head>
<body>

<div class="login-box">

    <h2>Вход</h2>

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">
            Войти
        </button>

    </form>

    <div class="register-link">

        <a href="{% url 'register' %}">
            Нет аккаунта? Зарегистрироваться
        </a>

    </div>

</div>

</body>
</html>
